[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_USE_NETLIFY_EDGE = "true"

# Do NOT add a catch-all redirect here — the Next.js plugin handles routing
# automatically, including API routes (/api/*) as serverless functions.
